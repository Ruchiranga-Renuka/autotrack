<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vehicle Service Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="container">
    <section class="banner">
        <h1>Vehicle Service Management System</h1>
        <form th:action="@{/logout}" method="post" style="float: right;">
            <button type="submit" style="background: none; border: none; color: white; text-decoration: underline; cursor: pointer;">Logout</button>
        </form>
        <p>Track vehicles, service history, and repairs with a fresh, modern dashboard.</p>
    </section>

    <div class="section-row">
        <section class="card">
            <h2>Add Vehicle</h2>
            <form action="/addVehicle" method="post" enctype="multipart/form-data">
                <div class="form-row">
                    <label for="vehicle">Vehicle</label>
                    <input id="vehicle" type="text" name="Vehicle" required>
                </div>
                <div class="form-row">
                    <label for="model">Model</label>
                    <input id="model" type="text" name="model" required>
                </div>
                <div class="form-row">
                    <label for="year">Year</label>
                    <input id="year" type="number" name="year" required>
                </div>
                <div class="form-row">
                    <label for="ownerName">Owner Name</label>
                    <input id="ownerName" type="text" name="ownerName" required>
                </div>
                <div class="form-row">
                    <label for="photo">Vehicle Photo</label>
                    <input id="photo" type="file" name="photo" accept="image/*">
                </div>
                <div class="button-row">
                    <button type="submit" class="primary">Add Vehicle</button>
                </div>
            </form>
        </section>

        <section class="card">
            <h2>Add Service Record</h2>
            <form action="/addServiceRecord" method="post">
                <div class="form-row">
                    <label for="vehicleId">Vehicle ID</label>
                    <input id="vehicleId" type="text" name="vehicleId" required>
                </div>
                <div class="form-row">
                    <label for="serviceDate">Service Date</label>
                    <input id="serviceDate" type="date" name="serviceDate" required>
                </div>
                <div class="form-row">
                    <label for="description">Description</label>
                    <input id="description" type="text" name="description" required>
                </div>
                <div class="form-row">
                    <label for="cost">Cost</label>
                    <input id="cost" type="number" step="0.01" name="cost" required>
                </div>
                <div class="button-row">
                    <button type="submit" class="primary">Add Service Record</button>
                </div>
            </form>
        </section>
    </div>

    <section class="card">
        <h2>Vehicles</h2>
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Vehicle</th>
                    <th>Model</th>
                    <th>Year</th>
                    <th>Owner</th>
                    <th>Photo</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="vehicle : ${vehicles}">
                    <td th:text="${vehicle.id}"></td>
                    <td th:text="${vehicle.make}"></td>
                    <td th:text="${vehicle.model}"></td>
                    <td th:text="${vehicle.year}"></td>
                    <td th:text="${vehicle.ownerName}"></td>
                    <td>
                        <img th:if="${vehicle.photoPath}" th:src="${vehicle.photoPath}" alt="Vehicle Photo" style="max-width: 100px; max-height: 100px;">
                        <span th:if="${!vehicle.photoPath}">No Photo</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="card">
        <h2>Service Records</h2>
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Vehicle ID</th>
                    <th>Date</th>
                    <th>Description</th>
                    <th>Cost</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="record : ${records}">
                    <td th:text="${record.id}"></td>
                    <td th:text="${record.vehicleId}"></td>
                    <td th:text="${record.serviceDate}"></td>
                    <td th:text="${record.description}"></td>
                    <td th:text="${record.cost}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</div>
</body>
</html>
