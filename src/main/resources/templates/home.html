<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vehicle Service Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        form { margin-bottom: 20px; padding: 10px; border: 1px solid #ccc; }
        input, button { margin: 5px; padding: 5px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Vehicle Service Management System</h1>

    <h2>Add Vehicle</h2>
    <form action="/addVehicle" method="post">
        Make: <input type="text" name="make" required><br>
        Model: <input type="text" name="model" required><br>
        Year: <input type="number" name="year" required><br>
        Owner Name: <input type="text" name="ownerName" required><br>
        <button type="submit">Add Vehicle</button>
    </form>

    <h2>Add Service Record</h2>
    <form action="/addServiceRecord" method="post">
        Vehicle ID: <input type="text" name="vehicleId" required><br>
        Service Date (YYYY-MM-DD): <input type="date" name="serviceDate" required><br>
        Description: <input type="text" name="description" required><br>
        Cost: <input type="number" step="0.01" name="cost" required><br>
        <button type="submit">Add Service Record</button>
    </form>

    <h2>Vehicles</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Make</th>
            <th>Model</th>
            <th>Year</th>
            <th>Owner</th>
        </tr>
        <tr th:each="vehicle : ${vehicles}">
            <td th:text="${vehicle.id}"></td>
            <td th:text="${vehicle.make}"></td>
            <td th:text="${vehicle.model}"></td>
            <td th:text="${vehicle.year}"></td>
            <td th:text="${vehicle.ownerName}"></td>
        </tr>
    </table>

    <h2>Service Records</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Vehicle ID</th>
            <th>Date</th>
            <th>Description</th>
            <th>Cost</th>
        </tr>
        <tr th:each="record : ${records}">
            <td th:text="${record.id}"></td>
            <td th:text="${record.vehicleId}"></td>
            <td th:text="${record.serviceDate}"></td>
            <td th:text="${record.description}"></td>
            <td th:text="${record.cost}"></td>
        </tr>
    </table>
</body>
</html>
