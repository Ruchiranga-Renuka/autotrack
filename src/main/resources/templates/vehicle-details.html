<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vehicle Details - Vehicle Management System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="container">
    <div class="app-shell">
        <aside class="sidebar">
            <h1 class="brand">Vehicle Details</h1>
            <p class="sidebar-copy">View a single vehicle record, add service history, and return to the dashboard.</p>
            <div class="nav-separator"></div>
            <ul class="nav-list">
                <li><a th:href="@{/}">Home</a></li>
                <li><a th:href="@{/}">Dashboard</a></li>
            </ul>
            <div class="sidebar-cta">
                <a class="button-link primary" th:href="@{/}">Back to Home</a>
            </div>
        </aside>
        <main class="content">
            <section class="card">
                <h2>Vehicle Details</h2>
                <div class="form-row">
                    <label>Vehicle ID</label>
                    <span th:text="${vehicle.id}"></span>
                </div>
                <div class="form-row">
                    <label>Make</label>
                    <span th:text="${vehicle.make}"></span>
                </div>
                <div class="form-row">
                    <label>Model</label>
                    <span th:text="${vehicle.model}"></span>
                </div>
                <div class="form-row">
                    <label>Year</label>
                    <span th:text="${vehicle.year}"></span>
                </div>
                <div class="form-row">
                    <label>Owner</label>
                    <span th:text="${vehicle.ownerName}"></span>
                </div>
                <div class="form-row">
                    <label>Photo</label>
                    <div>
                        <img th:if="${vehicle.photoPath != null and !vehicle.photoPath.isEmpty()}" th:src="${vehicle.photoPath}" alt="Vehicle Photo" class="vehicle-photo">
                        <span th:if="${vehicle.photoPath == null or vehicle.photoPath.isEmpty()}">No Photo</span>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>Add Service Record</h2>
                <form th:action="@{/addServiceRecord}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <input type="hidden" name="vehicleId" th:value="${vehicle.id}" />
                    <div class="form-row">
                        <label for="serviceDate">Service Date</label>
                        <input id="serviceDate" type="date" name="serviceDate" required>
                    </div>
                    <div class="form-row">
                        <label for="description">Description</label>
                        <input id="description" type="text" name="description" required>
                    </div>
                    <div class="form-row">
                        <label for="cost">Cost</label>
                        <input id="cost" type="number" step="0.01" name="cost" required>
                    </div>
                    <div class="button-row">
                        <button type="submit" class="primary">Save Service Record</button>
                    </div>
                </form>
            </section>

            <section class="card">
                <h2>Service History</h2>
                <div class="table-container">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Cost</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="record : ${records}">
                            <td th:text="${record.id}"></td>
                            <td th:text="${record.serviceDate}"></td>
                            <td th:text="${record.description}"></td>
                            <td th:text="${record.cost}"></td>
                        </tr>
                        <tr th:if="${records.empty}">
                            <td colspan="4">No service records found for this vehicle.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
