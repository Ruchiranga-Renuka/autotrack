<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${vehicle.make + ' ' + vehicle.model + ' - Vehicle Details'}">Vehicle Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body class="page-app">
<div class="container">
    <div class="app-shell">
        <aside class="sidebar">
            <h1 class="brand">VSMS</h1>
            <p class="sidebar-copy">View this vehicle's profile, photo, and full service history in one place.</p>
            <div class="nav-separator"></div>
            <ul class="nav-list">
                <li><a th:href="@{/}">Home</a></li>
                <li><a th:href="@{/vehicles}">Vehicle Management</a></li>
            </ul>
            <div class="sidebar-cta">
                <a class="button-link primary" th:href="@{/vehicles}">Back to Vehicles</a>
            </div>
        </aside>
        <main class="content">
            <section class="vehicle-detail-hero"
                     th:style="${vehicle.photoPath != null and !vehicle.photoPath.isEmpty()} ? 'background-image: none' : null">
                <img th:if="${vehicle.photoPath != null and !vehicle.photoPath.isEmpty()}"
                     th:src="${vehicle.photoPath}"
                     alt="Vehicle photo"
                     class="vehicle-detail-hero__photo" />
                <div class="vehicle-detail-hero__overlay">
                    <h1 class="vehicle-detail-hero__title"
                        th:text="${vehicle.make + ' ' + vehicle.model}">Vehicle</h1>
                    <p class="vehicle-detail-hero__meta">
                        <span th:text="${vehicle.year}">Year</span> &bull;
                        Owner: <span th:text="${vehicle.ownerName}">Owner</span> &bull;
                        ID: <span th:text="${vehicle.id}">ID</span>
                    </p>
                </div>
            </section>

            <div class="section-row">
                <section class="card">
                    <h2>Vehicle Information</h2>
                    <div class="form-row">
                        <label>Make</label>
                        <span th:text="${vehicle.make}"></span>
                    </div>
                    <div class="form-row">
                        <label>Model</label>
                        <span th:text="${vehicle.model}"></span>
                    </div>
                    <div class="form-row">
                        <label>Year</label>
                        <span th:text="${vehicle.year}"></span>
                    </div>
                    <div class="form-row">
                        <label>Owner</label>
                        <span th:text="${vehicle.ownerName}"></span>
                    </div>
                    <div class="form-row" th:if="${vehicle.photoPath != null and !vehicle.photoPath.isEmpty()}">
                        <label>Photo</label>
                        <img th:src="${vehicle.photoPath}" alt="Vehicle photo" class="vehicle-photo vehicle-photo--large" />
                    </div>
                </section>

                <section class="card">
                    <h2>Add Service Record</h2>
                    <form th:action="@{/addServiceRecord}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <input type="hidden" name="vehicleId" th:value="${vehicle.id}" />
                        <div class="form-row">
                            <label for="serviceDate">Service Date</label>
                            <input id="serviceDate" type="date" name="serviceDate" required>
                        </div>
                        <div class="form-row">
                            <label for="description">Description</label>
                            <input id="description" type="text" name="description" required>
                        </div>
                        <div class="form-row">
                            <label for="cost">Cost</label>
                            <input id="cost" type="number" step="0.01" name="cost" required>
                        </div>
                        <div class="button-row">
                            <button type="submit" class="primary">Save Service Record</button>
                        </div>
                    </form>
                </section>
            </div>

            <section class="card">
                <h2>Service History</h2>
                <div class="table-container">
                    <table>
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Cost</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="record : ${records}">
                            <td th:text="${record.id}"></td>
                            <td th:text="${record.serviceDate}"></td>
                            <td th:text="${record.description}"></td>
                            <td th:text="${record.cost}"></td>
                        </tr>
                        <tr th:if="${records.empty}">
                            <td colspan="4">No service records found for this vehicle.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</div>
</body>
</html>
